name: qt33
description: QT33 dedicated Android mobile app (Flutter)
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1
  sqflite: ^2.4.1
  path: ^1.9.1
  path_provider: ^2.1.5
  shared_preferences: ^2.5.3
  intl: ^0.20.2
  uuid: ^4.5.1
  pdf: ^3.11.3
  printing: ^5.14.2
  share_plus: ^10.1.4
  file_picker: ^8.3.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.4

flutter:
  uses-material-design: true
  assets:
    - assets/branding/qt33_logo.png

flutter_launcher_icons:
  android: true
  image_path: assets/branding/qt33_logo.png

flutter_native_splash:
  color: "#0A1C3F"
  image: assets/branding/qt33_logo.png
  android_12:
    color: "#0A1C3F"
    image: assets/branding/qt33_logo.png
